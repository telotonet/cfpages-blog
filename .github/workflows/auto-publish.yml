name: Auto Publish Article

on:
  schedule:
    # Runs every day at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      topic_hint:
        description: 'Optional topic hint (e.g. "HubSpot vs Salesforce")'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC_HINT: ${{ github.event.inputs.topic_hint || '' }}
        run: node scripts/generate-article.mjs

      - name: Create branch and commit
        id: commit
        env:
          SLUG: ${{ steps.generate.outputs.slug }}
        run: |
          BRANCH="article/${SLUG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add content/articles/
          git commit -m "article: ${{ steps.generate.outputs.title }}"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open and auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.commit.outputs.branch }}
          TITLE: ${{ steps.generate.outputs.title }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Article: $TITLE" \
            --body "Automated article generated by Claude. Merging to trigger Cloudflare Pages deploy.")
          echo "PR: $PR_URL"
          gh pr merge "$PR_URL" --squash --auto --delete-branch
